  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue: #3182f6;
      --blue-light: #ebf3fe;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-600: #6b7280;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'Apple SD Gothic Neo', BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      position: relative;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      padding: 0;
      animation: fadeIn 0.3s ease;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LANDING ── */
    #landing {
      align-items: center;
      justify-content: space-between;
      padding: 60px 24px 40px;
      text-align: center;
    }
    .landing-top { display: flex; flex-direction: column; align-items: center; gap: 20px; flex: 1; justify-content: center; }
    .landing-emoji { font-size: 72px; line-height: 1; }
    .landing-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.3; }
    .landing-title span { color: var(--blue); }
    .landing-sub { font-size: 15px; color: var(--gray-600); line-height: 1.6; margin-top: 4px; }
    .landing-badges { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
    .badge {
      background: var(--blue-light); color: var(--blue);
      font-size: 13px; font-weight: 600;
      padding: 6px 12px; border-radius: 100px;
    }
    .landing-characters {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; width: 100%; margin: 20px 0;
    }
    .char-preview {
      background: var(--gray-50); border-radius: 14px;
      padding: 12px 6px; text-align: center; font-size: 11px;
      color: var(--gray-600); cursor: default;
      border: 1.5px solid var(--gray-100);
      transition: all 0.15s;
    }
    .char-preview:hover { border-color: var(--blue); background: var(--blue-light); }
    .char-preview .emoji { font-size: 30px; display: block; margin-bottom: 5px; }
    .char-preview .char-name { font-weight: 700; color: var(--gray-800); font-size: 12px; }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      padding: 20px 24px 0;
      position: sticky; top: 0; background: #fff; z-index: 10;
    }
    .progress-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .progress-header .q-label { font-size: 13px; color: var(--gray-400); font-weight: 500; }
    .progress-header .q-num { font-size: 13px; color: var(--blue); font-weight: 700; }
    .progress-track {
      height: 6px; background: var(--gray-100); border-radius: 100px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--blue); border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── QUESTION ── */
    #question { padding: 0; }
    .q-body { padding: 28px 24px 32px; flex: 1; display: flex; flex-direction: column; gap: 24px; }
    .q-text {
      font-size: 20px; font-weight: 700; line-height: 1.45;
      letter-spacing: -0.3px; color: var(--gray-900);
    }
    .q-emoji { font-size: 32px; margin-bottom: 4px; display: block; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      background: var(--gray-50); border: 2px solid var(--gray-100);
      border-radius: var(--radius); padding: 16px 18px;
      font-size: 15px; font-weight: 500; color: var(--gray-800);
      cursor: pointer; text-align: left;
      transition: all 0.15s ease;
      display: flex; align-items: center; gap: 12px;
      line-height: 1.4;
    }
    .option:hover { border-color: var(--blue); background: var(--blue-light); }
    .option.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
    .option-letter {
      width: 28px; height: 28px; min-width: 28px;
      background: var(--gray-200); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--gray-600);
      transition: all 0.15s;
    }
    .option.selected .option-letter { background: var(--blue); color: #fff; }

    /* ── LOADING ── */
    #loading {
      align-items: center; justify-content: center; gap: 24px;
      text-align: center; padding: 40px 24px;
    }
    .loading-emoji { font-size: 64px; animation: spin 1.5s linear infinite; display: block; }
    @keyframes spin { 0%,100%{transform:rotate(-15deg) scale(1)} 50%{transform:rotate(15deg) scale(1.1)} }
    .loading-text { font-size: 20px; font-weight: 700; }
    .loading-sub { font-size: 14px; color: var(--gray-400); }
    .loading-bar-wrap { width: 200px; height: 6px; background: var(--gray-100); border-radius: 100px; overflow: hidden; }
    .loading-bar { height: 100%; background: var(--blue); border-radius: 100px; animation: loadAnim 1.8s ease-in-out forwards; }
    @keyframes loadAnim { from{width:0} to{width:100%} }

    /* ── RESULT ── */
    #result { padding: 0 0 80px; }
    .result-header {
      padding: 32px 24px 28px;
      background: linear-gradient(135deg, var(--blue) 0%, #5b8ff9 100%);
      color: #fff; text-align: center;
      border-radius: 0 0 32px 32px;
    }
    .result-label { font-size: 13px; font-weight: 600; opacity: 0.8; margin-bottom: 8px; }
    .result-char-img {
      width: 120px; height: 120px; margin: 8px auto 12px;
      background: rgba(255,255,255,0.2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; line-height: 1;
    }
    .result-type { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .result-tagline { font-size: 14px; opacity: 0.85; margin-top: 8px; line-height: 1.5; }

    .result-section { padding: 24px; }
    .result-card {
      background: var(--gray-50); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px;
    }
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--gray-400);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .desc-text { font-size: 15px; line-height: 1.7; color: var(--gray-800); }

    .rx-list { display: flex; flex-direction: column; gap: 12px; }
    .rx-item {
      display: flex; gap: 12px; align-items: flex-start;
      background: #fff; border-radius: 16px; padding: 16px;
      border: 1px solid var(--gray-100);
    }
    .rx-num {
      width: 28px; height: 28px; min-width: 28px;
      background: var(--blue-light); color: var(--blue);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; margin-top: 1px;
    }
    .rx-body { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .rx-title { font-size: 14px; font-weight: 700; color: var(--gray-900); line-height: 1.5; }
    .rx-desc { font-size: 13px; line-height: 1.6; color: var(--gray-600); }
    .rx-effect {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; padding: 3px 10px;
      background: #f0faf4; border-radius: 20px;
      font-size: 12px; font-weight: 600; color: #16a34a;
    }

    .cta-card {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: var(--radius); padding: 20px;
      color: #fff; margin-bottom: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cta-card .cta-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
    .cta-card .cta-title { font-size: 16px; font-weight: 700; }
    .cta-card .cta-arrow { font-size: 20px; }

    /* ── BUTTONS ── */
    .btn {
      width: 100%; padding: 18px;
      border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      background: var(--gray-100); color: var(--gray-800);
      margin-top: 10px;
    }
    .btn-share {
      background: #fee500; color: #3c1e1e;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-share img { width: 20px; height: 20px; }

    /* ── BOTTOM CTA area ── */
    .btn-area { padding: 0 24px; display: flex; flex-direction: column; gap: 10px; }

    /* ── AD ── */
    .ad-wrap {
      margin: 0 24px 16px;
      min-height: 56px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border-radius: 12px;
    }
    /* 광고 미연동 시 표시되는 placeholder */
    .ad-placeholder {
      width: 100%; background: var(--gray-100); border-radius: 12px;
      height: 56px; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--gray-400);
    }

    /* ── RETRY button on result ── */
    .retry-link {
      text-align: center; padding: 8px;
      font-size: 14px; color: var(--gray-400);
      cursor: pointer; text-decoration: underline;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ① LANDING -->

  <!-- ② QUESTION -->
  <div id="question" class="screen">

  <!-- ③ LOADING -->
  <div id="loading" class="screen">

  <!-- ④ RESULT -->

    <div class="result-section">

      <div class="result-card">

    <!-- ── 광고 영역 (AdSense 자동 광고) ── -->
    <div class="ad-wrap">
      <ins class="adsbygoogle"
           style="display:block;width:100%;min-height:50px"
           data-ad-client="ca-pub-8404805453959049"
           data-ad-slot="auto"

           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

    <!-- CTA 카드 -->
    <div class="result-section" style="padding-top:0">

          <div class="cta-label">추천 액션</div>
          <div class="cta-title" id="r-cta-text"></div>
        </div>
        <span class="cta-arrow">→</span>

    </div>

    <div class="btn-area">
      <button class="btn btn-share" onclick="shareResult()">
        📤 결과 공유하기
      </button>
      <button class="btn btn-secondary" onclick="restartTest()">다시 테스트하기</button>
    </div>
    <div class="retry-link" onclick="restartTest()">다른 유형도 보고 싶어요</div>
    <div style="height: 20px"></div>
  </div>

</div>

// ── STATE ──────────────────────────────────────────────
let scores = { S:0, C:0, D:0, U:0, H:0, F:0, G:0, A:0 };
let currentQ = 0;
let resultType = null;

// ── HELPERS ──────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startTest() {
  scores = { S:0, C:0, D:0, U:0, H:0, F:0, G:0, A:0 };
  currentQ = 0;
  show('question');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;

  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${((currentQ + 1) / total) * 100}%`;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.text;

  const letters = ['A', 'B', 'C', 'D'];
  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = q.options.map((opt, i) => `
    <button class="option" onclick="selectOption(${i})">
      <span class="option-letter">${letters[i]}</span>
      <span>${opt.label}</span>
    </button>
  `).join('');
}

function selectOption(idx) {
  // Visual feedback
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });

  // Add scores
  const chosen = QUESTIONS[currentQ].options[idx].scores;
  for (const [key, val] of Object.entries(chosen)) {
    scores[key] = (scores[key] || 0) + val;
  }

  // Delay before next question
  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      showLoading();
    }
  }, 350);
}

function showLoading() {
  show('loading');
  setTimeout(showResult, 2000);
}

function showResult() {
  // Find winner
  // 타입별 최대 획득 가능 점수 계산 후 정규화 (편향 방지)
  const maxPossible = {};
  QUESTIONS.forEach(q => q.options.forEach(opt =>
    Object.entries(opt.scores).forEach(([k, v]) => {
      maxPossible[k] = (maxPossible[k] || 0) + v;
    })
  ));
  const normalized = {};
  Object.keys(scores).forEach(k => {
    normalized[k] = maxPossible[k] > 0 ? scores[k] / maxPossible[k] : 0;
  });
  resultType = Object.entries(normalized).sort((a, b) => b[1] - a[1])[0][0];
  const t = TYPES[resultType];

  document.getElementById('r-emoji').textContent = t.emoji;
  document.getElementById('r-type').textContent = t.name;
  document.getElementById('r-tagline').textContent = t.tagline;
  document.getElementById('r-desc').textContent = t.desc;

  document.getElementById('r-rx').innerHTML = t.rx.map((r, i) => `
    <div class="rx-item">
      <span class="rx-num">${i + 1}</span>
      <div class="rx-body">
        <span class="rx-title">${r.title}</span>
        <span class="rx-desc">${r.desc}</span>
        <span class="rx-effect">${r.effect}</span>
      </div>
    </div>
  `).join('');

  document.getElementById('r-cta-text').textContent = t.cta;
  show('result');
}

function handleCTA() {
  const t = TYPES[resultType];
  if (t && t.ctaUrl) window.open(t.ctaUrl, '_blank');
}

function restartTest() {
  startTest();
}

// ── OG / 공유 이미지 생성 (Canvas) ──────────────────
function generateShareImage(type) {
  return new Promise(resolve => {
    const t = TYPES[type];
    const canvas = document.createElement('canvas');
    canvas.width = 1200; canvas.height = 630;
    const ctx = canvas.getContext('2d');

    // 배경 그라데이션
    const grad = ctx.createLinearGradient(0, 0, 1200, 630);
    grad.addColorStop(0, '#3182f6');
    grad.addColorStop(1, '#5b8ff9');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1200, 630);

    // 흰 카드
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.roundRect(60, 60, 1080, 510, 32);
    ctx.fill();

    // 이모지 (큰 글자)
    ctx.font = '160px serif';
    ctx.textAlign = 'center';
    ctx.fillText(t.emoji, 260, 380);

    // 제목
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 52px -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('나의 소비 유형', 400, 220);

    // 타입명
    ctx.font = 'bold 72px -apple-system, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(t.name, 400, 320);

    // 태그라인 (줄바꿈 처리)
    ctx.font = '32px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const words = t.tagline.split(' ');
    let line = ''; let y = 400;
    for (const word of words) {
      const test = line + word + ' ';
      if (ctx.measureText(test).width > 720 && line) {
        ctx.fillText(line.trim(), 400, y); line = word + ' '; y += 44;
      } else { line = test; }
    }
    if (line) ctx.fillText(line.trim(), 400, y);

    // 하단 앱명
    ctx.font = 'bold 28px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.textAlign = 'right';
    ctx.fillText('💸 돈성 테스트', 1140, 540);

    resolve(canvas.toDataURL('image/png'));
  });
}

async function shareResult() {
  const t = TYPES[resultType];
  const shareText = `나의 소비 유형은 "${t.emoji} ${t.name}"!\n${t.tagline}\n\n나도 테스트해보기 👉 https://grinbi-snap.github.io/donseong/`;

  // 이미지 생성 시도
  try {
    const imgData = await generateShareImage(resultType);

    // Web Share API (이미지 포함, 모바일)
    if (navigator.share && navigator.canShare) {
      const blob = await (await fetch(imgData)).blob();
      const file = new File([blob], 'donseong-result.png', { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ title: '돈성 테스트 결과', text: shareText, files: [file] });
        return;
      }
    }

    // 이미지 다운로드 + 텍스트 복사 (데스크탑)
    if (navigator.clipboard) {
      await navigator.clipboard.writeText(shareText);
    }
    const a = document.createElement('a');
    a.href = imgData;
    a.download = `돈성-${t.name}.png`;
    a.click();
    setTimeout(() => alert('결과 이미지가 저장됐어요!\n텍스트도 클립보드에 복사됐습니다 📤'), 300);

  } catch(e) {
    // fallback: 텍스트만
    if (navigator.clipboard) {
      navigator.clipboard.writeText(shareText)
        .then(() => alert('결과가 클립보드에 복사됐어요! 친구에게 공유해보세요 📤'));
    } else {
      alert(shareText);
    }
  }
}
